steps:
  # Set up QEMU for cross-arch emulation
  - name: 'gcr.io/cloud-builders/docker'
    id: qemu
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker run --privileged --rm tonistiigi/binfmt --install all

  # Create buildx builder
  - name: 'gcr.io/cloud-builders/docker'
    id: buildx-init
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker buildx create --use --name multiarch-builder --driver docker-container
        docker buildx inspect --bootstrap

  # Build and push multi-arch (linux/amd64 + linux/arm64) via manifest list
  - name: 'gcr.io/cloud-builders/docker'
    id: build-push
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          --build-arg GITHUB_TOKEN=${_GITHUB_TOKEN} \
          --tag ${_IMAGE_BASE}:${_VERSION} \
          --tag ${_IMAGE_BASE}:latest \
          --push \
          .
substitutions:
  _IMAGE_BASE: us-docker.pkg.dev/liquidity-registry/liquidityio/tasks
  _VERSION: v2.0.2
  _GITHUB_TOKEN: ''
options:
  machineType: E2_HIGHCPU_32
timeout: 2400s
