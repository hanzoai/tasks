steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'GITHUB_TOKEN=${_GITHUB_TOKEN}'
      - '-t'
      - '${_IMAGE}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']
substitutions:
  _IMAGE: us-docker.pkg.dev/liquidity-registry/liquidityio/tasks:v1.0.0
  _GITHUB_TOKEN: ''
images:
  - '${_IMAGE}'
options:
  machineType: E2_HIGHCPU_8
timeout: 600s
