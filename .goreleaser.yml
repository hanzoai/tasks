# GoReleaser v2 configuration
version: 2

before:
  hooks:
    - go mod download

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

archives:
  - id: default
    ids:
      - tasksd
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - ./config/*

builds:
  - id: tasksd
    dir: cmd/tasksd
    binary: tasksd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  disable: true

announce:
  skip: true
