# Hanzo Tasks ingress — single host for UI + REST.
#   tasks.hanzo.ai → tasks:80   (HTTP: UI + /healthz + /v1/tasks/*)
# ZAP wire (port 9999) is reached over the cluster service directly by
# in-cluster workers; no external ingress needed for binary RPC.

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tasks
  namespace: hanzo
  labels:
    app: tasks
    app.kubernetes.io/name: tasks
    app.kubernetes.io/part-of: hanzo-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: ingress
  tls:
    - hosts: [tasks.hanzo.ai]
      secretName: tasks-hanzo-ai-tls
  rules:
    - host: tasks.hanzo.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tasks
                port:
                  number: 80
