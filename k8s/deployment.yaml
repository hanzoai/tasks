# Hanzo Tasks -- Durable Workflow Engine
#
# Two services:
#   tasks    -- Tasks server (auto-setup), port 7233 (gRPC) + 7234 (HTTP)
#   tasks-ui -- Tasks UI, port 8080
#
# PostgreSQL: sql.hanzo.svc:5432 (shared, database: tasks + tasks_visibility)
# Auth: hanzo.id (IAM) via OIDC
# Routing: tasks.hanzo.ai (UI) + tasks-api.hanzo.ai (gRPC) via ingress.yaml
# Secrets: managed by KMS -- see kms-secrets.yaml

---
# -- Tasks Server Deployment ---------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasks
  namespace: hanzo
  labels:
    app: tasks
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tasks
  template:
    metadata:
      labels:
        app: tasks
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z sql.hanzo.svc.cluster.local 5432; do echo waiting for postgres...; sleep 2; done']
      containers:
        - name: tasks
          image: ghcr.io/hanzoai/tasks:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7233
              name: grpc
            - containerPort: 7234
              name: http
          env:
            # -- Database --
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_SEEDS
              value: sql.hanzo.svc.cluster.local
            - name: POSTGRES_USER
              value: tasks
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: tasks-secrets
                  key: POSTGRES_PASSWORD

            # -- Dynamic config --
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: /etc/tasks/dynamic-config/dynamic-config.yaml

            # -- Tasks server identity --
            - name: BIND_ON_IP
              value: "0.0.0.0"
            - name: NUM_HISTORY_SHARDS
              value: "512"
            - name: PUBLIC_FRONTEND_ADDRESS
              value: "tasks:7233"

            # -- Multi-tenancy --
            - name: TASKS_AUTH_ENABLED
              value: "true"
            - name: TASKS_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: tasks-secrets
                  key: TASKS_AUTH_SECRET

            # -- Hanzo IAM OIDC --
            - name: IAM_URL
              value: https://hanzo.id
            - name: IAM_INTERNAL_URL
              value: http://iam.hanzo.svc
            - name: IAM_CLIENT_ID
              value: app-tasks
            - name: IAM_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tasks-secrets
                  key: IAM_CLIENT_SECRET

            # -- JWT Auth (server-side token validation) --
            # The Tasks server validates JWTs from the UI using hanzo.id JWKS.
            # In-cluster: use internal IAM URL for JWKS to avoid hairpin routing.
            - name: TEMPORAL_JWT_KEY_SOURCE1
              value: "http://iam.hanzo.svc/.well-known/jwks"
            - name: TEMPORAL_JWT_KEY_REFRESH
              value: "5m"
            - name: TEMPORAL_AUTH_AUTHORIZER
              value: "default"
            - name: TEMPORAL_AUTH_CLAIM_MAPPER
              value: "default"
            - name: TEMPORAL_JWT_PERMISSIONS_CLAIM
              value: "permissions"

            # -- OTEL Tracing --
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.hanzo.svc:4318"
            - name: OTEL_SERVICE_NAME
              value: "tasks"

            # -- Insights (Product Analytics) --
            - name: INSIGHTS_HOST
              value: "http://insights-capture.hanzo.svc:3000"
            - name: INSIGHTS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: insights-client-secrets
                  key: API_KEY
                  optional: true

            # -- Logging --
            - name: LOG_LEVEL
              value: info

          volumeMounts:
            - name: dynamic-config
              mountPath: /etc/tasks/dynamic-config
            - name: tasks-data
              mountPath: /etc/tasks/data

          startupProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 7233
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi

      volumes:
        - name: dynamic-config
          configMap:
            name: tasks-config
        - name: tasks-data
          persistentVolumeClaim:
            claimName: tasks-data-pvc

---
# -- Tasks Server PVC ---------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tasks-data-pvc
  namespace: hanzo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# -- Tasks Server Service ------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: tasks
  namespace: hanzo
spec:
  selector:
    app: tasks
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
    - name: http
      port: 7234
      targetPort: 7234

---
# -- Tasks UI Deployment -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasks-ui
  namespace: hanzo
  labels:
    app: tasks-ui
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tasks-ui
  template:
    metadata:
      labels:
        app: tasks-ui
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-tasks
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z tasks 7233; do echo waiting for tasks server...; sleep 2; done']
      containers:
        - name: tasks-ui
          image: ghcr.io/hanzoai/tasks-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # -- Tasks server connection --
            - name: TASKS_ADDRESS
              value: tasks:7233
            - name: TASKS_CORS_ORIGINS
              value: https://tasks.hanzo.ai

            # -- Hanzo IAM OIDC --
            - name: TASKS_AUTH_ENABLED
              value: "true"
            - name: TASKS_AUTH_PROVIDER_URL
              value: https://hanzo.id
            - name: TASKS_AUTH_CLIENT_ID
              value: app-tasks
            - name: TASKS_AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tasks-secrets
                  key: IAM_CLIENT_SECRET
            - name: TASKS_AUTH_CALLBACK_URL
              value: https://tasks.hanzo.ai/auth/sso/callback
            - name: TASKS_AUTH_SCOPES
              value: openid,profile,email

            # -- OTEL Tracing --
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.hanzo.svc:4318"
            - name: OTEL_SERVICE_NAME
              value: "tasks-ui"

          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# -- Tasks UI Service ----------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: tasks-ui
  namespace: hanzo
spec:
  selector:
    app: tasks-ui
  ports:
    - name: http
      port: 80
      targetPort: 8080
