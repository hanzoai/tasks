# Hanzo Tasks Secrets via Hanzo KMS (kms.hanzo.ai)
#
# Uses shared universal-auth-credentials (same Machine Identity as chat,
# commerce, insights, etc.). Secrets are stored in the
# "hanzo-tasks" project under the /tasks path.
#
# Secrets stored in KMS at /tasks:
#   - POSTGRES_PASSWORD       # PostgreSQL auth for tasks persistence
#   - TASKS_AUTH_SECRET        # JWT signing key for multi-tenant auth
#   - IAM_CLIENT_SECRET       # hanzo.id OIDC client secret (app-tasks)
---
apiVersion: secrets.lux.network/v1alpha1
kind: KMSSecret
metadata:
  name: tasks-kms-sync
  namespace: hanzo
  labels:
    app.kubernetes.io/name: tasks
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: hanzo-platform
spec:
  hostAPI: http://kms.hanzo.svc.cluster.local/api
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: hanzo
      secretsScope:
        projectSlug: hanzo-k8s-epiq
        envSlug: prod
        secretsPath: /tasks
  managedSecretReference:
    secretName: tasks-secrets
    secretNamespace: hanzo
    secretType: Opaque
    creationPolicy: Orphan
