name: Promote Server Image

on:
  workflow_dispatch:
    inputs:
      source-tag:
        description: "Source tag from GHCR (e.g. sha-abc123)"
        required: true
      target-tags:
        description: "Target tags (comma or newline separated, e.g., 1.29.1, latest)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  promote:
    uses: ./.github/workflows/promote-docker-image.yml
    with:
      image-name: tasks
      source-tag: ${{ inputs.source-tag }}
      target-tags: ${{ inputs.target-tags }}
