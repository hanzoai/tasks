name: Build

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # Canonical image name for the Hanzo Tasks server. Other Hanzo
  # services (iam, kms, gateway, ingress, …) drop the "-server"
  # suffix — matching them so universe pins read uniformly.
  #
  # If GITHUB_TOKEN hits permission_denied on first push, the
  # ghcr.io/hanzoai/tasks package may need to be manually re-linked
  # to this repo in GHCR package settings (source is no longer
  # orphaned once a fresh build lands).
  REGISTRY: ghcr.io/hanzoai/tasks

jobs:
  build-amd64:
    runs-on: hanzo-build-linux-amd64
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          SHA=${GITHUB_SHA::8}
          REF=${GITHUB_REF_NAME}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "semver=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Build + push
        run: |
          IMG=${REGISTRY}:${{ steps.tags.outputs.ref }}-amd64
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.TOKEN_GITHUB_CICD }} \
            -t $IMG \
            -t ${REGISTRY}:${{ steps.tags.outputs.sha }}-amd64 \
            .
          docker push $IMG
          docker push ${REGISTRY}:${{ steps.tags.outputs.sha }}-amd64

  build-arm64:
    # ARM64 runner is currently on AWS EKS hanzo-arm64 (DOKS has no
    # arm64 nodes). When that's ready, flip `if: false` → `if: true`
    # or delete the guard. Until then, arm64 is pushed from the
    # developer's Mac via `docker buildx build --platform linux/arm64
    # --push -t ghcr.io/hanzoai/tasks:vX.Y.Z-arm64 .`
    if: false
    runs-on: hanzo-build-linux-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          SHA=${GITHUB_SHA::8}
          REF=${GITHUB_REF_NAME}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Build + push
        run: |
          IMG=${REGISTRY}:${{ steps.tags.outputs.ref }}-arm64
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.TOKEN_GITHUB_CICD }} \
            -t $IMG \
            -t ${REGISTRY}:${{ steps.tags.outputs.sha }}-arm64 \
            .
          docker push $IMG
          docker push ${REGISTRY}:${{ steps.tags.outputs.sha }}-arm64

  manifest:
    # Doesn't need build-arm64 — arm64 is pushed separately from the
    # developer's Mac. The manifest step picks up whichever per-arch
    # tags exist at the moment it runs.
    needs: [build-amd64]
    runs-on: hanzo-build-linux-amd64
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          SHA=${GITHUB_SHA::8}
          REF=${GITHUB_REF_NAME}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "semver=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Create manifests
        run: |
          set -e
          REF=${{ steps.tags.outputs.ref }}
          SHA=${{ steps.tags.outputs.sha }}

          # Assemble arch list from whatever's actually present. The
          # arm64 push is done locally from a developer Mac right now;
          # when the AWS EKS runner is ready we flip build-arm64's
          # `if: false` back to true and every run picks up both.
          arches_for() {
            local tag="$1"
            local arches=""
            for a in amd64 arm64; do
              if docker buildx imagetools inspect "${REGISTRY}:${tag}-${a}" >/dev/null 2>&1; then
                arches="${arches} ${REGISTRY}:${tag}-${a}"
              fi
            done
            echo "${arches}"
          }

          REF_SRCS=$(arches_for "${REF}")
          SHA_SRCS=$(arches_for "${SHA}")

          # docker manifest create rejects nested OCI image indexes
          # (attestation sub-manifests produced by buildx v6). Use
          # buildx imagetools which handles them natively.
          docker buildx imagetools create --tag "${REGISTRY}:${REF}" ${REF_SRCS}
          docker buildx imagetools create --tag "${REGISTRY}:${SHA}" ${SHA_SRCS}

          if [ "$REF" = "main" ]; then
            docker buildx imagetools create --tag "${REGISTRY}:latest" ${REF_SRCS}
          fi

      - name: Tag semver (on version tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -e
          VER=${{ steps.tags.outputs.semver }}
          arches=""
          for a in amd64 arm64; do
            if docker buildx imagetools inspect "${REGISTRY}:${GITHUB_REF_NAME}-${a}" >/dev/null 2>&1; then
              arches="${arches} ${REGISTRY}:${GITHUB_REF_NAME}-${a}"
            fi
          done
          docker buildx imagetools create --tag "${REGISTRY}:${VER}" ${arches}
