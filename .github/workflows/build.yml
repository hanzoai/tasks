name: Build

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/hanzoai/tasks

jobs:
  build-amd64:
    runs-on: hanzo-build-linux-amd64
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build + push
        run: |
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.TOKEN_GITHUB_CICD }} \
            -t ${REGISTRY}:${GITHUB_REF_NAME}-amd64 \
            .
          docker push ${REGISTRY}:${GITHUB_REF_NAME}-amd64

  build-arm64:
    runs-on: hanzo-build-linux-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build + push
        run: |
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.TOKEN_GITHUB_CICD }} \
            -t ${REGISTRY}:${GITHUB_REF_NAME}-arm64 \
            .
          docker push ${REGISTRY}:${GITHUB_REF_NAME}-arm64

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: hanzo-build-linux-amd64
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create multi-arch manifest
        run: |
          TAG=${GITHUB_REF_NAME}
          docker manifest create ${REGISTRY}:${TAG} \
            ${REGISTRY}:${TAG}-amd64 \
            ${REGISTRY}:${TAG}-arm64
          docker manifest push ${REGISTRY}:${TAG}
