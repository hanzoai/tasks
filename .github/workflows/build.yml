name: Build

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # Using -server suffix because the legacy 'hanzoai/tasks' GHCR package
  # is orphaned from this repo (no linked Repository field on the
  # package record) so GITHUB_TOKEN hits `permission_denied: write_package`
  # when pushing. A fresh package name is created and owned by this repo
  # on first push, which lets the token push future tags cleanly.
  REGISTRY: ghcr.io/hanzoai/tasks-server

jobs:
  build-amd64:
    runs-on: hanzo-build-linux-amd64
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          SHA=${GITHUB_SHA::8}
          REF=${GITHUB_REF_NAME}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "semver=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Build + push
        run: |
          IMG=${REGISTRY}:${{ steps.tags.outputs.ref }}-amd64
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.TOKEN_GITHUB_CICD }} \
            -t $IMG \
            -t ${REGISTRY}:${{ steps.tags.outputs.sha }}-amd64 \
            .
          docker push $IMG
          docker push ${REGISTRY}:${{ steps.tags.outputs.sha }}-amd64

  build-arm64:
    runs-on: hanzo-build-linux-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          SHA=${GITHUB_SHA::8}
          REF=${GITHUB_REF_NAME}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Build + push
        run: |
          IMG=${REGISTRY}:${{ steps.tags.outputs.ref }}-arm64
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.TOKEN_GITHUB_CICD }} \
            -t $IMG \
            -t ${REGISTRY}:${{ steps.tags.outputs.sha }}-arm64 \
            .
          docker push $IMG
          docker push ${REGISTRY}:${{ steps.tags.outputs.sha }}-arm64

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: hanzo-build-linux-amd64
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          SHA=${GITHUB_SHA::8}
          REF=${GITHUB_REF_NAME}
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "semver=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Create manifests
        run: |
          REF=${{ steps.tags.outputs.ref }}
          SHA=${{ steps.tags.outputs.sha }}

          # Branch/tag manifest
          docker manifest create ${REGISTRY}:${REF} \
            ${REGISTRY}:${REF}-amd64 \
            ${REGISTRY}:${REF}-arm64
          docker manifest push ${REGISTRY}:${REF}

          # SHA manifest
          docker manifest create ${REGISTRY}:${SHA} \
            ${REGISTRY}:${SHA}-amd64 \
            ${REGISTRY}:${SHA}-arm64
          docker manifest push ${REGISTRY}:${SHA}

          # latest (only from main)
          if [ "$REF" = "main" ]; then
            docker manifest create ${REGISTRY}:latest \
              ${REGISTRY}:${REF}-amd64 \
              ${REGISTRY}:${REF}-arm64
            docker manifest push ${REGISTRY}:latest
          fi

      - name: Tag semver (on version tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VER=${{ steps.tags.outputs.semver }}
          docker manifest create ${REGISTRY}:${VER} \
            ${REGISTRY}:${GITHUB_REF_NAME}-amd64 \
            ${REGISTRY}:${GITHUB_REF_NAME}-arm64
          docker manifest push ${REGISTRY}:${VER}
