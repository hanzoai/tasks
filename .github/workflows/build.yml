name: Build

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-amd64:
    runs-on: lqd-build-amd64
    steps:
      - uses: actions/checkout@v5

      - name: Auth GAR
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIAL }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build + push
        run: |
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.TOKEN_GITHUB_CICD }} \
            -t us-docker.pkg.dev/liquidity-registry/liquidityio/tasks:${GITHUB_REF_NAME}-amd64 \
            .
          docker push us-docker.pkg.dev/liquidity-registry/liquidityio/tasks:${GITHUB_REF_NAME}-amd64

  build-arm64:
    runs-on: lqd-build-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Auth GAR
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIAL }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build + push
        run: |
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.TOKEN_GITHUB_CICD }} \
            -t us-docker.pkg.dev/liquidity-registry/liquidityio/tasks:${GITHUB_REF_NAME}-arm64 \
            .
          docker push us-docker.pkg.dev/liquidity-registry/liquidityio/tasks:${GITHUB_REF_NAME}-arm64

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: lqd-build-amd64
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIAL }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Create multi-arch manifest
        run: |
          TAG=${GITHUB_REF_NAME}
          REG=us-docker.pkg.dev/liquidity-registry/liquidityio/tasks
          docker manifest create ${REG}:${TAG} \
            ${REG}:${TAG}-amd64 \
            ${REG}:${TAG}-arm64
          docker manifest push ${REG}:${TAG}
